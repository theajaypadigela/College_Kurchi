name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (pyflakes + syntax errors)
        run: ruff check app tests --select E9,F

      - name: Run tests
        run: pytest
        # Tests use mongomock, so no MongoDB service is required.
